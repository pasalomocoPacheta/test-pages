<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Builder + GitHub Pages</title>

  <script async src="https://cdn.builder.io/js/webcomponents"></script>

  <style>
    body { margin:0; font-family: system-ui, -apple-system, Arial, sans-serif; }
    builder-component { display:block; min-height: 100vh; }
  </style>
</head>
<body>

  <builder-component id="builderEl"></builder-component>

  <script>
    const API_KEY = "f450ca45929045f782ca4fdfb394abb9";
    const base = "/test-pages";
    const urlPath = location.pathname.startsWith(base)
      ? (location.pathname.slice(base.length) || "/")
      : (location.pathname || "/");

    async function load() {
      // Espera a que el custom element exista
      while (!customElements.get("builder-component")) {
        await new Promise(r => setTimeout(r, 50));
      }

      const res = await fetch(
        `https://cdn.builder.io/api/v2/content/page?apiKey=${API_KEY}` +
        `&userAttributes.urlPath=${encodeURIComponent(urlPath)}` +
        `&limit=1&enrich=true`
      );
      const data = await res.json();
      const content = data?.results?.[0];

      const el = document.getElementById("builderEl");

      if (!content) {
        el.innerHTML = `<div style="padding:24px">No hay página publicada para <b>${urlPath}</b></div>`;
        return;
      }

      // Inyecta el contenido al componente para que renderice
      el.setAttribute("api-key", API_KEY);
      el.setAttribute("model", "page");
      el.setAttribute("content", JSON.stringify(content));
    }

    load().catch(err => {
      console.error(err);
      document.body.innerHTML = "<pre style='padding:24px'>Error cargando Builder</pre>";
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beluga</title>

  <link rel="icon" href="data:," />

  <!-- SEO base (se actualiza al cargar Builder; ojo: esto NO es SEO SSR real) -->
  <meta name="description" content="" />
  <link rel="canonical" href="" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:url" content="" />
  <meta property="og:image" content="" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:url" content="" />
  <meta name="twitter:image" content="" />

  <script async src="https://cdn.builder.io/js/webcomponents"></script>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Arial, sans-serif; }
    builder-component { display:block; min-height: 100vh; }
    .shell { padding: 24px; max-width: 1100px; margin: 0 auto; }
  </style>
</head>

<body>
  <builder-component id="builderRoot"></builder-component>

  <script>
    // =========================
    // CONFIG
    // =========================
    const API_KEY = "f450ca45929045f782ca4fdfb394abb9";
    const BASE = "/test-pages";        // repo name en GitHub Pages
    const PAGE_MODEL = "page";         // model en Builder
    const NOT_FOUND_PATH = "/404";     // opcional: crea una page en Builder con URL "/404"
    // =========================

    const builderEl = document.getElementById("builderRoot");

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function waitForBuilderComponent() {
      while (!customElements.get("builder-component")) {
        await sleep(25);
      }
    }

    // 1) Lee la ruta real desde ?p= (SPA redirect típico en GitHub Pages)
    function readSpaRedirectPath() {
      const params = new URLSearchParams(location.search);
      // muchos 404-tricks usan ?p= o ?path=
      const p = params.get("p") || params.get("path");
      if (!p) return null;

      // p suele venir como "/testing" (ya decodeado por URLSearchParams)
      let path = p.trim();
      if (!path.startsWith("/")) path = "/" + path;

      // Limpia la URL (quita ?p=...) para que quede bonita
      // Mantiene el hash si lo hubiera
      const clean = location.pathname + location.hash;
      history.replaceState({}, "", clean);

      return path;
    }

    // 2) Convierte URL actual (GH Pages) -> urlPath Builder
    function toUrlPath() {
      // Si venimos de redirect SPA, manda eso directamente a Builder
      const redirected = readSpaRedirectPath();
      if (redirected) return redirected;

      const p = location.pathname || "/";

      // Casos:
      // /test-pages           -> /
      // /test-pages/          -> /
      // /test-pages/testing   -> /testing
      if (p === BASE || p === BASE + "/") return "/";
      if (p.startsWith(BASE + "/")) return p.slice(BASE.length) || "/";
      return p; // si no está bajo BASE, úsalo tal cual
    }

    function canonicalUrl() {
      // Canonical sin query
      return location.origin + (location.pathname || "/");
    }

    async function fetchBuilderContent(model, urlPath) {
      const url =
        `https://cdn.builder.io/api/v2/content/${encodeURIComponent(model)}` +
        `?apiKey=${encodeURIComponent(API_KEY)}` +
        `&userAttributes.urlPath=${encodeURIComponent(urlPath)}` +
        `&limit=1&enrich=true`;

      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`Builder API error ${res.status}`);
      const data = await res.json();
      return data?.results?.[0] || null;
    }

    // ---------- SEO helpers ----------
    function ensureMeta(attr, key, value) {
      if (value == null) return;
      let el = document.head.querySelector(`meta[${attr}="${key}"]`);
      if (!el) {
        el = document.createElement("meta");
        el.setAttribute(attr, key);
        document.head.appendChild(el);
      }
      el.setAttribute("content", value);
    }

    function ensureLink(rel, href) {
      if (!href) return;
      let el = document.head.querySelector(`link[rel="${rel}"]`);
      if (!el) {
        el = document.createElement("link");
        el.setAttribute("rel", rel);
        document.head.appendChild(el);
      }
      el.setAttribute("href", href);
    }

    function absolutize(url) {
      if (!url) return "";
      try { return new URL(url, location.origin).toString(); }
      catch { return ""; }
    }

    function pickSeoImage(d) {
      return (
        d.ogImage ||
        d.og_image ||
        d.image ||
        d.imageUrl ||
        d.socialImage ||
        (d.meta && (d.meta.ogImage || d.meta.image)) ||
        ""
      );
    }

    function getSeoFromContent(content) {
      const d = content?.data || {};
      return {
        title: d.title || content?.name || "",
        description: d.description || "",
        image: pickSeoImage(d)
      };
    }

    function applySeo({ title, description, image }) {
      const canon = canonicalUrl();
      const img = absolutize(image);

      if (title) document.title = title;

      ensureMeta("name", "description", description || "");
      ensureLink("canonical", canon);

      ensureMeta("property", "og:type", "website");
      ensureMeta("property", "og:title", title || "");
      ensureMeta("property", "og:description", description || "");
      ensureMeta("property", "og:url", canon);
      ensureMeta("property", "og:image", img || "");

      ensureMeta("name", "twitter:card", img ? "summary_large_image" : "summary");
      ensureMeta("name", "twitter:title", title || "");
      ensureMeta("name", "twitter:description", description || "");
      ensureMeta("name", "twitter:url", canon);
      ensureMeta("name", "twitter:image", img || "");
    }

    // ---------- navegación interna (respeta BASE) ----------
    function normalizeHref(href) {
      // Convierte "/testing" -> "/test-pages/testing" (solo en GH Pages)
      if (!href) return href;
      if (/^https?:\/\//i.test(href)) return href;
      if (href.startsWith("mailto:") || href.startsWith("tel:")) return href;

      // ya viene con BASE
      if (href === BASE || href.startsWith(BASE + "/")) return href;

      // rutas absolutas del sitio "/testing"
      if (href.startsWith("/")) return BASE + href;

      // rutas relativas "testing"
      return BASE + "/" + href.replace(/^\.?\//, "");
    }

    async function render() {
      const urlPath = toUrlPath();

      await waitForBuilderComponent();

      let content = await fetchBuilderContent(PAGE_MODEL, urlPath);

      if (!content && urlPath !== "/") {
        content = await fetchBuilderContent(PAGE_MODEL, NOT_FOUND_PATH);
      }

      if (!content) {
        builderEl.removeAttribute("content");
        builderEl.innerHTML = `
          <div class="shell">
            <h1>404</h1>
            <p>No existe una página publicada para <b>${urlPath}</b>.</p>
            <p><a href="${BASE}/">Volver a Home</a></p>
          </div>`;
        applySeo({ title: "404 - No encontrado", description: "", image: "" });
        return;
      }

      applySeo(getSeoFromContent(content));

      builderEl.setAttribute("api-key", API_KEY);
      builderEl.setAttribute("model", PAGE_MODEL);
      builderEl.setAttribute("content", JSON.stringify(content));
    }

    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;

      const hrefRaw = a.getAttribute("href");
      if (!hrefRaw) return;

      const isModified = e.metaKey || e.ctrlKey || e.shiftKey || e.altKey;
      if (isModified) return;

      // intercepta solo internos
      if (/^https?:\/\//i.test(hrefRaw)) return;

      e.preventDefault();
      const href = normalizeHref(hrefRaw);
      history.pushState({}, "", href);
      render().catch(console.error);
    });

    window.addEventListener("popstate", () => render().catch(console.error));

    render().catch(err => {
      console.error(err);
      builderEl.innerHTML = `<div class="shell"><h1>Error</h1><pre>${String(err)}</pre></div>`;
      applySeo({ title: "Error", description: "", image: "" });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beluga (Builder + GitHub Pages)</title>
  <link rel="icon" href="data:,">

  <script async src="https://cdn.builder.io/js/webcomponents"></script>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Arial, sans-serif; }
    builder-component { display: block; min-height: 100vh; }
    .shell { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .muted { opacity: .7; }
  </style>
</head>
<body>

  <div class="shell muted" style="padding-bottom:0">
    <a href="/test-pages/">Home</a> ·
    <a href="/test-pages/about">About</a> ·
    <a href="/test-pages/servicios">Servicios</a>
  </div>

  <!-- IMPORTANTE: api-key y model aquí desde el principio -->
  <builder-component
    id="builderEl"
    api-key="f450ca45929045f782ca4fdfb394abb9"
    model="page">
  </builder-component>

  <script>
    const API_KEY = "f450ca45929045f782ca4fdfb394abb9";
    const BASE = "/test-pages";
    const PAGE_MODEL = "page";

    function toUrlPath() {
      const p = location.pathname || "/";
      if (p === BASE || p === BASE + "/") return "/";
      if (p.startsWith(BASE + "/")) return p.slice(BASE.length) || "/";
      return p;
    }

    async function waitForBuilderComponent() {
      while (!customElements.get("builder-component")) {
        await new Promise(r => setTimeout(r, 30));
      }
    }

    async function fetchBuilderContent(model, urlPath) {
      const url =
        `https://cdn.builder.io/api/v2/content/${encodeURIComponent(model)}` +
        `?apiKey=${encodeURIComponent(API_KEY)}` +
        `&userAttributes.urlPath=${encodeURIComponent(urlPath)}` +
        `&limit=1&enrich=true`;

      const res = await fetch(url);
      if (!res.ok) throw new Error(`Builder API ${res.status}`);
      const data = await res.json();
      return data?.results?.[0] || null;
    }

    async function render() {
      await waitForBuilderComponent();

      const el = document.getElementById("builderEl");
      const urlPath = toUrlPath();

      let content = await fetchBuilderContent(PAGE_MODEL, urlPath);

      if (!content && urlPath !== "/") {
        content = await fetchBuilderContent(PAGE_MODEL, "/404");
      }

      if (!content) {
        el.innerHTML = `
          <div class="shell">
            <h1>404</h1>
            <p>No existe una página publicada para <b>${urlPath}</b>.</p>
            <p><a href="${BASE}/">Volver a Home</a></p>
          </div>`;
        return;
      }

      // Aquí ya NO ponemos api-key/model (ya estaban). Solo content.
      el.setAttribute("content", JSON.stringify(content));
    }

    // Navegación SPA
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;

      const href = a.getAttribute("href");
      if (!href) return;

      const isSameSite = href.startsWith(BASE + "/") || href === BASE || href.startsWith("/");
      const isModified = e.metaKey || e.ctrlKey || e.shiftKey || e.altKey;
      if (!isSameSite || isModified) return;

      e.preventDefault();
      history.pushState({}, "", href);
      render();
    });

    window.addEventListener("popstate", render);

    render().catch(err => {
      console.error(err);
      document.getElementById("builderEl").innerHTML =
        `<div class="shell"><h1>Error</h1><pre>${String(err)}</pre></div>`;
    });
  </script>
</body>
</html>

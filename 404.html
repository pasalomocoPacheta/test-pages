<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirect</title>
    <meta http-equiv="refresh" content="0; url=/test-pages/" />
    <script>
      // Redirige /test-pages/cualquier-ruta -> /test-pages/?p=/cualquier-ruta
      (function () {
        const BASE = "/test-pages";
        const path = location.pathname || "/";
        let sub = "/";

        if (path === BASE || path === BASE + "/") sub = "/";
        else if (path.startsWith(BASE + "/")) sub = path.slice(BASE.length) || "/";
        else sub = path;

        const target = BASE + "/?p=" + encodeURIComponent(sub);
        location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
